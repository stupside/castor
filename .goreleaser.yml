version: 2
project_name: castor

builds:
  - id: linux-amd64
    main: .
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - "CGO_CFLAGS=-I{{ .Env.WHISPER_INCLUDE }} -I{{ .Env.WHISPER_GGML_INCLUDE }}"
      - "CGO_LDFLAGS=-L{{ .Env.WHISPER_BUILD_AMD64 }}/src -L{{ .Env.WHISPER_BUILD_AMD64 }}/ggml/src"
    ldflags: &ldflags
      - -s -w
      - -X 'github.com/stupside/castor/internal/version.Commit={{.Commit}}'
      - -X 'github.com/stupside/castor/internal/version.BuildTime={{.Date}}'
      - -X 'github.com/stupside/castor/internal/version.Version={{.Version}}'
    binary: castor

  - id: linux-arm64
    main: .
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=zcc-arm64
      - "CGO_CFLAGS=-I{{ .Env.WHISPER_INCLUDE }} -I{{ .Env.WHISPER_GGML_INCLUDE }}"
      - "CGO_LDFLAGS=-L{{ .Env.WHISPER_BUILD_ARM64 }}/src -L{{ .Env.WHISPER_BUILD_ARM64 }}/ggml/src"
    ldflags: *ldflags
    binary: castor

  - id: darwin-amd64
    main: .
    goos: [darwin]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - "CGO_CFLAGS=-I{{ .Env.WHISPER_INCLUDE }} -I{{ .Env.WHISPER_GGML_INCLUDE }}"
      - "CGO_LDFLAGS=-L{{ .Env.WHISPER_BUILD_AMD64 }}/src -L{{ .Env.WHISPER_BUILD_AMD64 }}/ggml/src -L{{ .Env.WHISPER_BUILD_AMD64 }}/ggml/src/ggml-blas -L{{ .Env.WHISPER_BUILD_AMD64 }}/ggml/src/ggml-metal"
    ldflags: *ldflags
    binary: castor

  - id: darwin-arm64
    main: .
    goos: [darwin]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - "CGO_CFLAGS=-I{{ .Env.WHISPER_INCLUDE }} -I{{ .Env.WHISPER_GGML_INCLUDE }}"
      - "CGO_LDFLAGS=-L{{ .Env.WHISPER_BUILD_ARM64 }}/src -L{{ .Env.WHISPER_BUILD_ARM64 }}/ggml/src -L{{ .Env.WHISPER_BUILD_ARM64 }}/ggml/src/ggml-blas -L{{ .Env.WHISPER_BUILD_ARM64 }}/ggml/src/ggml-metal"
    ldflags: *ldflags
    binary: castor

dockers:
  - ids: [linux-amd64]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - ghcr.io/stupside/castor:{{ .Tag }}-amd64
      - ghcr.io/stupside/castor:latest-amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
      - --label=org.opencontainers.image.description=Cast video streams to networked devices
      - --label=org.opencontainers.image.licenses=MIT

  - ids: [linux-arm64]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - ghcr.io/stupside/castor:{{ .Tag }}-arm64
      - ghcr.io/stupside/castor:latest-arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
      - --label=org.opencontainers.image.description=Cast video streams to networked devices
      - --label=org.opencontainers.image.licenses=MIT

docker_manifests:
  - name_template: ghcr.io/stupside/castor:{{ .Tag }}
    image_templates:
      - ghcr.io/stupside/castor:{{ .Tag }}-amd64
      - ghcr.io/stupside/castor:{{ .Tag }}-arm64
  - name_template: ghcr.io/stupside/castor:latest
    image_templates:
      - ghcr.io/stupside/castor:latest-amd64
      - ghcr.io/stupside/castor:latest-arm64

changelog:
  sort: asc
  use: git
  format: "{{ .SHA }}: {{ .Message }}{{ with .AuthorUsername }} (@{{ . }}){{ end }}"
  filters:
    exclude: ["^docs:", "^test:", "^chore:"]

release:
  name_template: "v{{ .Version }}"
  footer: |
    **Full Changelog**: https://github.com/stupside/castor/compare/{{ .PreviousTag }}...{{ if .IsNightly }}nightly{{ else }}{{ .Tag }}{{ end }}

homebrew_casks:
  - name: castor
    description: "Cast video streams to networked devices"
    commit_author:
      name: castor
      email: git@castor.dev
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    zap:
      trash: ["~/.castor/config.yml"]
      delete: ["~/.castor/config.yml"]
    repository:
      name: "homebrew-tap"
      owner: "stupside"
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
