name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  # Build libwhisper.a on the platform that owns it — no cross-compile hacks.
  # macOS runner gets native Metal/BLAS; Linux arm64 uses zig (legitimate CGO
  # cross-compiler, not a workaround).
  build-whisper:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: build_linux_amd64
          - runner: ubuntu-latest
            artifact: build_linux_arm64
            zig_triple: aarch64-linux-gnu.2.17
            cmake_args: >-
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DCMAKE_C_COMPILER=zcc
              -DCMAKE_CXX_COMPILER=zxx
          - runner: macos-latest
            artifact: build_darwin_amd64
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - runner: macos-latest
            artifact: build_darwin_arm64
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=arm64
    runs-on: ${{ matrix.runner }}
    env:
      WHISPER: ${{ github.workspace }}/third_party/whisper.cpp
      BUILD: ${{ github.workspace }}/third_party/whisper.cpp/${{ matrix.artifact }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        if: matrix.zig_triple
        with:
          version: latest
      - name: Create zig wrappers
        if: matrix.zig_triple
        run: |
          printf '#!/bin/sh\nexec zig cc  -target ${{ matrix.zig_triple }} "$@"\n' | sudo tee /usr/local/bin/zcc > /dev/null
          printf '#!/bin/sh\nexec zig c++ -target ${{ matrix.zig_triple }} "$@"\n' | sudo tee /usr/local/bin/zxx > /dev/null
          sudo chmod +x /usr/local/bin/zcc /usr/local/bin/zxx
      - name: Build libwhisper
        run: |
          cmake -S $WHISPER -B $BUILD \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=OFF \
            ${{ matrix.cmake_args }}
          cmake --build $BUILD --target whisper \
            -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.BUILD }}

  # Single goreleaser run once all whisper libs are ready.
  # Runs on ubuntu so Docker buildx is available; uses zig only for the thin
  # CGO wrapper layer (Go ↔ whisper.h) — not for compiling whisper itself.
  release:
    needs: build-whisper
    runs-on: ubuntu-latest
    env:
      WHISPER_INCLUDE: ${{ github.workspace }}/third_party/whisper.cpp/include
      WHISPER_GGML_INCLUDE: ${{ github.workspace }}/third_party/whisper.cpp/ggml/include
      WHISPER_BUILD_LINUX_AMD64: ${{ github.workspace }}/third_party/whisper.cpp/build_linux_amd64
      WHISPER_BUILD_LINUX_ARM64: ${{ github.workspace }}/third_party/whisper.cpp/build_linux_arm64
      WHISPER_BUILD_DARWIN_AMD64: ${{ github.workspace }}/third_party/whisper.cpp/build_darwin_amd64
      WHISPER_BUILD_DARWIN_ARM64: ${{ github.workspace }}/third_party/whisper.cpp/build_darwin_arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: latest
      - name: Create zig cross-compile wrappers
        run: |
          for target in \
            "linux-arm64:aarch64-linux-gnu.2.17" \
            "darwin-amd64:x86_64-macos.12.0.0" \
            "darwin-arm64:aarch64-macos.12.0.0"; do
            name="${target%%:*}"; triple="${target##*:}"
            printf '#!/bin/sh\nexec zig cc  -target %s "$@"\n' "$triple" | sudo tee /usr/local/bin/zcc-"$name" > /dev/null
            printf '#!/bin/sh\nexec zig c++ -target %s "$@"\n' "$triple" | sudo tee /usr/local/bin/zxx-"$name" > /dev/null
          done
          sudo chmod +x /usr/local/bin/zcc-* /usr/local/bin/zxx-*
      # Artifact name == dir name, so this restores the exact paths goreleaser
      # expects via WHISPER_BUILD_* env vars.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: build_*
          path: ${{ github.workspace }}/third_party/whisper.cpp/
          merge-multiple: false
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
