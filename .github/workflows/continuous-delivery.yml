name: continuous-delivery

# release-please grooms a standing Release PR from Conventional Commits; on its
# merge it cuts the v<x.y.z> tag + GitHub Release and hands the stable version to
# _delivery (the shared build/publish engine the canary lane also calls). Because
# both jobs run in this single workflow run, no PAT is needed to bridge the tag to
# the build.

on:
  push:
    branches: [ main ]

permissions: {}

concurrency:
  group: cd
  cancel-in-progress: false

jobs:
  please:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.release.outputs.releases_created }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The merged Release PR already bumped the manifest to the tagged version.
      - name: Read released version
        id: version
        if: steps.release.outputs.releases_created == 'true'
        run: echo "version=$(jq -r '."."' .release-please-manifest.json)" >> "$GITHUB_OUTPUT"

  delivery:
    needs: please
    if: needs.please.outputs.released == 'true'
    uses: ./.github/workflows/_delivery.yml
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: write
    with:
      version: ${{ needs.please.outputs.version }}
