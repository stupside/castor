name: continuous-integration

on:
  push:
    paths-ignore: ['docs/**']
    branches-ignore: ['main']
  pull_request:
    branches: ['**']
    paths-ignore: ['docs/**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - uses: ./.github/actions/setup
      - run: eval "$(make env)" && go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - uses: ./.github/actions/setup
      - run: eval "$(make env)" && go vet ./...
      - run: |
          unformatted=$(gofmt -s -l cmd internal main.go)
          [ -z "$unformatted" ] || { printf 'unformatted:\n%s\n' "$unformatted"; exit 1; }
