name: Lint
description: Build libwhisper.a (cached), vet, and check formatting

runs:
  using: composite
  steps:
    - id: whisper
      run: echo "rev=$(git -C third_party/whisper.cpp rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      shell: bash
    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: third_party/whisper.cpp/build_go
        key: libwhisper-${{ runner.os }}-${{ steps.whisper.outputs.rev }}
    - run: go mod download
      shell: bash
    # go vet type-checks the module, which needs the cgo env that make exports.
    - run: eval "$(make env)" && go vet ./...
      shell: bash
    - name: Check formatting
      # First-party code only — the vendored whisper.cpp tree is not ours
      # to format.
      run: |
        unformatted=$(gofmt -s -l cmd internal main.go)
        if [ -n "$unformatted" ]; then
          echo "Files not formatted:"
          echo "$unformatted"
          exit 1
        fi
      shell: bash
