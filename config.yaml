# Castor ships working defaults for everything mechanical (timeouts, probing,
# capture, transcoding, network interface, Chrome discovery). This file only
# holds what identifies your install: the device to cast to, the sources to
# cast from, and explicit opt-ins. Any default can still be overridden here
# or via CASTOR_SECTION__FIELD environment variables.

device:
  # Run `castor scan` to discover devices on your network, then paste the name here.
  name: "Samsung Q80CA 55 TV"
  type: "dlna"

sources:
  # Castor ships no sources of its own. You bring your own, the same way a media
  # server points at libraries you provide. Each entry is a site whose embedded
  # player Castor can extract a stream from: `proxies` are base URLs (tried in
  # order, so list mirrors of the same site together), and `templates` map an
  # IMDB/TMDB id to that site's movie and episode paths. Replace the placeholders
  # below with a source you are authorized to use.
  - proxies:
      - "https://your-source.example"
    templates:
      movie: "/embed/movie/{itemID}"
      episode: "/embed/tv/{itemID}/{season}-{episode}"

  # Sources can also pass their parameters as a query string; use whichever
  # shape matches the site you are pointing at.
  - proxies:
      - "https://another-source.example"
    templates:
      movie: "/embed?type=movie&id={itemID}"
      episode: "/embed?type=tv&id={itemID}&season={season}&episode={episode}"

whisper:
  # Auto-generated subtitles, burned into the video. This is the only toggle
  # (no CLI flag). The transcription and VAD models download once to your
  # user cache; language defaults to English — set `language` for anything
  # else, and `model_path` to trade speed for accuracy.
  enable: false

resolver:
  # The tallest video to cast. Source selection prefers the largest stream no
  # taller than this, and the encoder scales its output down to it. Defaults to
  # 1080; raise it to your TV's native height (e.g. 2160 for a 4K panel) to pass
  # 4K through, or lower it to save bandwidth.
  # max_height: 1080

tmdb:
  # Used by the interactive `castor cast`. Get a free key at https://www.themoviedb.org/settings/api
  # Put the real key in git-ignored config.local.yaml (overlays this file),
  # or set CASTOR_TMDB__API_KEY in the environment.
  api_key: "<YOUR_TMDB_API_KEY>"
